<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KJELDGAARD Søg</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e4e4e7; min-height: 100vh; }
    
    .container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
    
    h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .subtitle { color: #71717a; font-size: 14px; margin-bottom: 24px; }
    
    /* Back link */
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: #71717a; text-decoration: none; font-size: 14px; margin-bottom: 24px; }
    .back-link:hover { color: #a1a1aa; }
    
    /* Search bar */
    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-input { flex: 1; background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 15px; outline: none; }
    .search-input:focus { border-color: #3b82f6; }
    .search-input::placeholder { color: #52525b; }
    .search-btn { background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .search-btn:hover { background: #2563eb; }
    
    /* Filters */
    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-group { display: flex; gap: 4px; }
    .filter-btn { background: #18181b; border: 1px solid #27272a; border-radius: 6px; padding: 6px 14px; color: #a1a1aa; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: #3f3f46; color: #e4e4e7; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    
    .tema-select { background: #18181b; border: 1px solid #27272a; border-radius: 6px; padding: 6px 12px; color: #a1a1aa; font-size: 13px; cursor: pointer; margin-left: 8px; }
    .tema-select:focus { border-color: #3b82f6; outline: none; }
    
    /* Quick tags */
    .quick-tags { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .quick-tag { background: #1e1e24; border: 1px solid #27272a; border-radius: 16px; padding: 4px 12px; color: #71717a; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .quick-tag:hover { border-color: #3b82f6; color: #3b82f6; }
    .quick-tag .count { color: #52525b; font-size: 11px; margin-left: 4px; }
    
    /* Results count */
    .results-info { color: #71717a; font-size: 13px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #1e1e24; }
    .results-info strong { color: #e4e4e7; }
    
    /* Result cards */
    .result-card { background: #18181b; border: 1px solid #27272a; border-radius: 10px; padding: 16px; margin-bottom: 10px; transition: border-color 0.15s; }
    .result-card:hover { border-color: #3f3f46; }
    
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .result-name { font-weight: 600; color: #fff; font-size: 15px; }
    .result-source { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .source-tp { background: #1e3a2f; color: #4ade80; }
    .source-vdo { background: #1e2a3e; color: #60a5fa; }
    .source-meta { background: #2e1e3a; color: #c084fc; }
    
    .result-meta { display: flex; gap: 12px; color: #71717a; font-size: 12px; margin-bottom: 8px; flex-wrap: wrap; }
    
    .result-text { color: #a1a1aa; font-size: 14px; line-height: 1.6; }
    .result-text.truncated { max-height: 100px; overflow: hidden; }
    .result-text mark { background: #3b82f633; color: #93c5fd; border-radius: 2px; padding: 0 2px; }
    
    .result-temaer { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .tema-tag { background: #27272a; color: #a1a1aa; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .tema-tag.match { background: #3b82f633; color: #93c5fd; }
    
    /* Expand button */
    .expand-btn { background: none; border: none; color: #3b82f6; font-size: 12px; cursor: pointer; margin-top: 8px; padding: 0; }
    .expand-btn:hover { color: #60a5fa; }
    
    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: #52525b; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    
    /* Loading */
    .loading { text-align: center; padding: 40px; color: #52525b; }
    
    /* Stats bar */
    .stats-bar { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-mini { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 10px 16px; flex: 1; text-align: center; }
    .stat-mini-number { font-size: 20px; font-weight: 700; color: #fff; }
    .stat-mini-label { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; }
    
    /* Keyboard shortcut hint */
    .kbd { background: #27272a; border: 1px solid #3f3f46; border-radius: 4px; padding: 1px 5px; font-size: 11px; color: #71717a; font-family: monospace; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/admin.html" class="back-link">← Tilbage til Admin</a>
    
    <h1>🔍 Søg i testimonials</h1>
    <p class="subtitle">Søg på tværs af Trustpilot, Video og Meta kommentarer</p>
    
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-mini">
        <div class="stat-mini-number" id="stat-tp">-</div>
        <div class="stat-mini-label">Trustpilot</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-number" id="stat-vdo">-</div>
        <div class="stat-mini-label">Video</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-number" id="stat-meta">-</div>
        <div class="stat-mini-label">Meta</div>
      </div>
    </div>
    
    <!-- Search -->
    <div class="search-bar">
      <input type="text" class="search-input" id="search-input" placeholder="Søg efter keyword, navn, tema..." autofocus>
      <button class="search-btn" id="search-btn">Søg</button>
    </div>
    
    <!-- Source filter -->
    <div class="filters">
      <div class="filter-group">
        <button class="filter-btn active" data-source="all">Alle</button>
        <button class="filter-btn" data-source="tp">Trustpilot</button>
        <button class="filter-btn" data-source="vdo">Video</button>
        <button class="filter-btn" data-source="meta">Meta</button>
      </div>
    </div>
    
    <!-- Tema oversigt -->
    <div class="quick-tags" id="quick-tags">
      <span style="color:#52525b;font-size:12px;">Indlæser temaer...</span>
    </div>
    
    <!-- Results -->
    <div id="results-info" class="results-info" style="display:none;"></div>
    <div id="results"></div>
    
    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <div class="icon">🔍</div>
      <p>Søg efter et keyword eller vælg et tema for at finde testimonials</p>
      <p style="margin-top:8px; font-size:12px;">Tryk <span class="kbd">/</span> for at fokusere søgefeltet</p>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let currentSource = 'all';
    let expandedCards = new Set();
    
    // Load stats
    async function loadStats() {
      try {
        const res = await fetch(API + '/api/stats');
        const data = await res.json();
        document.getElementById('stat-tp').textContent = data.testimonials || 0;
        document.getElementById('stat-vdo').textContent = data.videos || 0;
        document.getElementById('stat-meta').textContent = data.metacomments || 0;
      } catch (e) { console.error(e); }
    }
    
    // Highlight matches in text
    function highlight(text, query) {
      if (!query || !text) return text || '';
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${escaped})`, 'gi');
      return text.replace(regex, '<mark>$1</mark>');
    }
    
    // Search
    async function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      
      if (!q) {
        document.getElementById('results').innerHTML = '';
        document.getElementById('results-info').style.display = 'none';
        document.getElementById('empty-state').style.display = 'block';
        return;
      }
      
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('results').innerHTML = '<div class="loading">Søger...</div>';
      
      try {
        const params = new URLSearchParams();
        if (q) params.set('q', q);
        params.set('source', currentSource);
        
        const res = await fetch(API + '/api/search?' + params.toString());
        const data = await res.json();
        
        renderResults(data, q);
      } catch (e) {
        document.getElementById('results').innerHTML = '<div class="empty-state"><p>Fejl ved søgning: ' + e.message + '</p></div>';
      }
    }
    
    // Render results
    function renderResults(data, query) {
      const container = document.getElementById('results');
      const info = document.getElementById('results-info');
      
      if (!data.results.length) {
        info.style.display = 'none';
        container.innerHTML = '<div class="empty-state"><div class="icon">🤷</div><p>Ingen resultater fundet</p></div>';
        return;
      }
      
      // Count by source
      const counts = { tp: 0, vdo: 0, meta: 0 };
      data.results.forEach(r => counts[r._source]++);
      
      const parts = [];
      if (counts.tp) parts.push(counts.tp + ' TP');
      if (counts.vdo) parts.push(counts.vdo + ' VDO');
      if (counts.meta) parts.push(counts.meta + ' META');
      
      info.style.display = 'block';
      info.innerHTML = '<strong>' + data.total + '</strong> resultater fundet (' + parts.join(', ') + ')';
      
      container.innerHTML = data.results.map((item, idx) => {
        const fullText = item.tekst || item.transkription || '';
        const isLong = fullText.length > 250;
        const isExpanded = expandedCards.has(idx);
        const displayText = (isLong && !isExpanded) ? fullText.substring(0, 250) + '...' : fullText;
        
        const sourceClass = 'source-' + item._source;
        
        // Meta info parts
        const metaParts = [];
        if (item.dato) metaParts.push(item.dato);
        if (item.alder) metaParts.push(item.alder + ' år');
        if (item.hudbekymring) metaParts.push(item.hudbekymring);
        if (item.rating) metaParts.push('★'.repeat(item.rating));
        if (item.awareness) metaParts.push(item.awareness);
        if (item.kilde) metaParts.push(item.kilde);
        
        // Temaer
        const temaerHtml = (item.temaer || []).map(t => {
          const isMatch = query && t.toLowerCase().includes(query.toLowerCase());
          return '<span class="tema-tag' + (isMatch ? ' match' : '') + '">' + t + '</span>';
        }).join('');
        
        return `
          <div class="result-card" data-idx="${idx}">
            <div class="result-header">
              <span class="result-name">${highlight(item.navn || 'Anonym', query)}</span>
              <span class="result-source ${sourceClass}">${item._sourceLabel}</span>
            </div>
            ${metaParts.length ? '<div class="result-meta">' + metaParts.join(' · ') + '</div>' : ''}
            <div class="result-text${isLong && !isExpanded ? ' truncated' : ''}">${highlight(displayText, query)}</div>
            ${isLong ? '<button type="button" class="expand-btn" onclick="toggleExpand(' + idx + ')">' + (isExpanded ? 'Vis mindre ▲' : 'Vis mere ▼') + '</button>' : ''}
            ${temaerHtml ? '<div class="result-temaer">' + temaerHtml + '</div>' : ''}
          </div>
        `;
      }).join('');
    }
    
    // Toggle expand
    window.toggleExpand = function(idx) {
      var scrollPos = document.documentElement.scrollTop || document.body.scrollTop;
      var card = document.querySelector('[data-idx="' + idx + '"]');
      if (!card) return;
      var textEl = card.querySelector('.result-text');
      var btn = card.querySelector('.expand-btn');
      if (expandedCards.has(idx)) {
        expandedCards.delete(idx);
        textEl.classList.add('truncated');
        btn.textContent = 'Vis mere ▼';
      } else {
        expandedCards.add(idx);
        textEl.classList.remove('truncated');
        btn.textContent = 'Vis mindre ▲';
      }
      requestAnimationFrame(function() {
        window.scrollTo(0, scrollPos);
      });
    };
    
    // Event listeners
    document.getElementById('search-btn').addEventListener('click', () => {
      expandedCards.clear();
      doSearch();
    });
    
    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        expandedCards.clear();
        doSearch();
      }
    });
    
    // Source filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSource = btn.dataset.source;
        expandedCards.clear();
        doSearch();
      });
    });
    
    // Load temaer dynamically
    async function loadTemaer() {
      try {
        const res = await fetch(API + '/api/temaer');
        const data = await res.json();
        const container = document.getElementById('quick-tags');
        
        container.innerHTML = data.temaer.map(t => 
          `<span class="quick-tag" data-q="${t.tema}">${t.tema}<span class="count">${t.count}</span></span>`
        ).join('');
        
        container.querySelectorAll('.quick-tag').forEach(tag => {
          tag.addEventListener('click', () => {
            document.getElementById('search-input').value = tag.dataset.q;
            expandedCards.clear();
            doSearch();
          });
        });
      } catch (e) { console.error(e); }
    }
    
    // Keyboard shortcut: / to focus search
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== document.getElementById('search-input')) {
        e.preventDefault();
        document.getElementById('search-input').focus();
      }
    });
    
    // Init
    loadStats();
    loadTemaer();
  </script>
</body>
</html>
